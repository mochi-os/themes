name: i18n Check

on:
  pull_request:
    paths:
      - 'labels/**'
      - '.github/workflows/i18n-check.yml'
      - '.github/scripts/check-labels.py'
  push:
    branches: [main, master]
    paths:
      - 'labels/**'
      - '.github/workflows/i18n-check.yml'
      - '.github/scripts/check-labels.py'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  labels:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check server label completeness
        run: python3 .github/scripts/check-labels.py
